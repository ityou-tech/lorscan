<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}lorscana{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bangers&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="/scan" class="brand">lorscana</a>
    <nav>
      <a href="/scan">Scan</a>
      <a href="/collection">Collection</a>
      <a href="/missing">Missing</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <small>local Lorcana collection manager · v0.1</small>
  </footer>
  <script src="{{ url_for('static', path='js/binder.js') }}" defer></script>
</body>
</html>

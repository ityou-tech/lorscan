<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}lorscan{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="/scan" class="brand">lorscan</a>
    <nav>
      <a href="/scan">Scan</a>
      <a href="/scan/webcam">Webcam</a>
      <a href="/collection">Collection</a>
      <a href="/missing">Missing</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <small>local Lorcana collection manager · v0.1</small>
  </footer>
</body>
</html>
